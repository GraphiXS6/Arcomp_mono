       x="19.074144"
       y="63.740963"
       id="text4"><tspan
         sodipodi:role="line"
         style="font-style:normal;font-variant:normal;font-weight:bold;font-stretch:normal;font-size:9.87778px;font-family:Arcomp_mono;-inkscape-font-specification:Arcomp_mono;text-align:start;writing-mode:lr-tb;direction:ltr;text-anchor:start;fill:#ffffff;fill-opacity:1;stroke-width:0.264583"
         x="19.074144"
         y="63.740963"
         id="tspan24">Αυτά 'πε και όλοι εσώπαιναν μες </tspan><tspan
         sodipodi:role="line"
         style="font-style:normal;font-variant:normal;font-weight:bold;font-stretch:normal;font-size:9.87778px;font-family:Arcomp_mono;-inkscape-font-specification:Arcomp_mono;text-align:start;writing-mode:lr-tb;direction:ltr;text-anchor:start;fill:#ffffff;fill-opacity:1;stroke-width:0.264583"
         x="19.074144"
         y="73.124855"
         id="tspan38">το ισκιωμένο δώμα όπως τους </tspan><tspan
         sodipodi:role="line"
         style="font-style:normal;font-variant:normal;font-weight:bold;font-stretch:normal;font-size:9.87778px;font-family:Arcomp_mono;-inkscape-font-specification:Arcomp_mono;text-align:start;writing-mode:lr-tb;direction:ltr;text-anchor:start;fill:#ffffff;fill-opacity:1;stroke-width:0.264583"
         x="19.074144"
         y="82.508743"
         id="tspan39">εκυρίευσε του λόγου του η </tspan><tspan
         sodipodi:role="line"
         style="font-style:normal;font-variant:normal;font-weight:bold;font-stretch:normal;font-size:9.87778px;font-family:Arcomp_mono;-inkscape-font-specification:Arcomp_mono;text-align:start;writing-mode:lr-tb;direction:ltr;text-anchor:start;fill:#ffffff;fill-opacity:1;stroke-width:0.264583"
         x="19.074144"
         y="91.892639"
         id="tspan48">μαγεία· τότε 'ς αυτόν απάντησεν </tspan><tspan
         sodipodi:role="line"
         style="font-style:normal;font-variant:normal;font-weight:bold;font-stretch:normal;font-size:9.87778px;font-family:Arcomp_mono;-inkscape-font-specification:Arcomp_mono;text-align:start;writing-mode:lr-tb;direction:ltr;text-anchor:start;fill:#ffffff;fill-opacity:1;stroke-width:0.264583"
         x="19.074144"
         y="101.27653"
         id="tspan40">ο Αλκίνοος και του 'πε·«Αφού </tspan><tspan
         sodipodi:role="line"
         style="font-style:normal;font-variant:normal;font-weight:bold;font-stretch:normal;font-size:9.87778px;font-family:Arcomp_mono;-inkscape-font-specification:Arcomp_mono;text-align:start;writing-mode:lr-tb;direction:ltr;text-anchor:start;fill:#ffffff;fill-opacity:1;stroke-width:0.264583"
         x="19.074144"
         y="110.66042"
         id="tspan41">'λθες 'ς το χαλκόστρωτο παλάτι </tspan><tspan
         sodipodi:role="line"
         style="font-style:normal;font-variant:normal;font-weight:bold;font-stretch:normal;font-size:9.87778px;font-family:Arcomp_mono;-inkscape-font-specification:Arcomp_mono;text-align:start;writing-mode:lr-tb;direction:ltr;text-anchor:start;fill:#ffffff;fill-opacity:1;stroke-width:0.264583"
         x="19.074144"
         y="120.04431"
         id="tspan42">μου, Οδυσσέα, θαρρώ 'που δεν </tspan><tspan
         sodipodi:role="line"
         style="font-style:normal;font-variant:normal;font-weight:bold;font-stretch:normal;font-size:9.87778px;font-family:Arcomp_mono;-inkscape-font-specification:Arcomp_mono;text-align:start;writing-mode:lr-tb;direction:ltr;text-anchor:start;fill:#ffffff;fill-opacity:1;stroke-width:0.264583"
         x="19.074144"
         y="129.42819"
         id="tspan43">θα πλανηθής οπίσω εις το </tspan><tspan
         sodipodi:role="line"
         style="font-style:normal;font-variant:normal;font-weight:bold;font-stretch:normal;font-size:9.87778px;font-family:Arcomp_mono;-inkscape-font-specification:Arcomp_mono;text-align:start;writing-mode:lr-tb;direction:ltr;text-anchor:start;fill:#ffffff;fill-opacity:1;stroke-width:0.264583"
         x="19.074144"
         y="138.81209"
         id="tspan44">ταξείδι, και, ως τώρ' αν και </tspan><tspan
         sodipodi:role="line"
         style="font-style:normal;font-variant:normal;font-weight:bold;font-stretch:normal;font-size:9.87778px;font-family:Arcomp_mono;-inkscape-font-specification:Arcomp_mono;text-align:start;writing-mode:lr-tb;direction:ltr;text-anchor:start;fill:#ffffff;fill-opacity:1;stroke-width:0.264583"
         x="19.074144"
         y="148.19598"
         id="tspan53">πολλά 'παθες, θα φθάσης 'ς την </tspan><tspan
         sodipodi:role="line"
         style="font-style:normal;font-variant:normal;font-weight:bold;font-stretch:normal;font-size:9.87778px;font-family:Arcomp_mono;-inkscape-font-specification:Arcomp_mono;text-align:start;writing-mode:lr-tb;direction:ltr;text-anchor:start;fill:#ffffff;fill-opacity:1;stroke-width:0.264583"
         x="19.074144"
         y="157.57986"
         id="tspan45">πατρίδα. τώρα εις καθέναν από </tspan><tspan
         sodipodi:role="line"
         style="font-style:normal;font-variant:normal;font-weight:bold;font-stretch:normal;font-size:9.87778px;font-family:Arcomp_mono;-inkscape-font-specification:Arcomp_mono;text-align:start;writing-mode:lr-tb;direction:ltr;text-anchor:start;fill:#ffffff;fill-opacity:1;stroke-width:0.264583"
         x="19.074144"
         y="166.96376"
         id="tspan64">σας, ιδού τι παραγγέλλω, 'ς το </tspan><tspan
         sodipodi:role="line"
         style="font-style:normal;font-variant:normal;font-weight:bold;font-stretch:normal;font-size:9.87778px;font-family:Arcomp_mono;-inkscape-font-specification:Arcomp_mono;text-align:start;writing-mode:lr-tb;direction:ltr;text-anchor:start;fill:#ffffff;fill-opacity:1;stroke-width:0.264583"
         x="19.074144"
         y="176.34766"
         id="tspan65">δώμα μ' όσοι ολοκαιρίς το </tspan><tspan
         sodipodi:role="line"
         style="font-style:normal;font-variant:normal;font-weight:bold;font-stretch:normal;font-size:9.87778px;font-family:Arcomp_mono;-inkscape-font-specification:Arcomp_mono;text-align:start;writing-mode:lr-tb;direction:ltr;text-anchor:start;fill:#ffffff;fill-opacity:1;stroke-width:0.264583"
         x="19.074144"
         y="185.73154"
         id="tspan66">εξαίρετο κρασί μουτο σπιθοβόλο </tspan><tspan
         sodipodi:role="line"
         style="font-style:normal;font-variant:normal;font-weight:bold;font-stretch:normal;font-size:9.87778px;font-family:Arcomp_mono;-inkscape-font-specification:Arcomp_mono;text-align:start;writing-mode:lr-tb;direction:ltr;text-anchor:start;fill:#ffffff;fill-opacity:1;stroke-width:0.264583"
         x="19.074144"
         y="195.11543"
         id="tspan67">πίνετε, και τον αοιδόν ακούτε.</tspan></text>
